<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" class="h-100" data-bs-theme="auto" >
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<th:block th:insert="~{template/fragments/block :: config}"></th:block>
<link href="/css/main.css" rel="stylesheet">
<link href="/css/productCSS/listP.css" rel="stylesheet">
</head>
<body>
	<th:block th:insert="~{template/fragments/block :: header}"></th:block>
	<th:block th:insert="~{template/fragments/block :: logo}"></th:block>
    <th:block th:insert="~{template/fragments/block :: mainMenu}"></th:block>
    <div class="layout-container">
	    <th:block th:insert="~{template/fragments/block :: sideMenu}"></th:block>
	    <!-- 본문 영역 -->
	    <main class="product">
		  <div class="product-list">
		    <div class="product-list__header">
		      <div>
		        <span class="product-list__eyebrow">Product Management</span>
		        <h2>상품 목록</h2>
		      </div>
		      <a href="/product/new" class="btn btn-primary">상품 등록</a>
		    </div>
		    
		    <!-- 검색 폼 -->
		    <form class="product-search" action="/product" method="get">
		      <select name="searchType">
		        <option value="name" th:selected="${searchType} == 'name'">제품명</option>
		        <option value="description" th:selected="${searchType} == 'description'">설명</option>
		        <option value="category" th:selected="${searchType} == 'category'">카테고리</option>
		      </select>
		      <input type="text" name="keyword" placeholder="검색어 입력" th:value="${keyword}">
		      <button type="submit">검색</button>
		    </form>
		
		    <!-- 상품 테이블 -->
		    <div class="product-table-wrap">
		      <table>
		        <thead>
		          <tr>
		            <th>번호</th>
		            <th>이미지</th>
		            <th>제품명</th>
		            <th>설명</th>
		            <th>가격</th>
		            <th>재고</th>
		            <th>카테고리</th>
		            <th>등록일</th>
		            <th>수정일</th>
		          </tr>
		        </thead>
		        <tbody>
		          <tr th:each="product, stat : ${productPage.content}">
		            <td data-label="번호" th:text="${stat.index + 1 + (productPage.number * productPage.size)}"></td>
		            <td data-label="이미지">
		              <img class="product-thumb"
		                   th:src="@{/product/image/{id}(id=${product.productId})}"
		                   alt="상품 이미지"
		                   onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%22120%22 viewBox=%220 0 120 120%22%3E%3Crect width=%22120%22 height=%22120%22 rx=%2220%22 fill=%22%23edf5ef%22/%3E%3Cpath d=%22M35 76l17-18 13 13 8-9 14 14H35z%22 fill=%22%2397b89f%22/%3E%3Ccircle cx=%2246%22 cy=%2244%22 r=%228%22 fill=%22%23b8d8bf%22/%3E%3Ctext x=%2260%22 y=%22100%22 text-anchor=%22middle%22 font-size=%2211%22 fill=%22%235f7767%22 font-family=%22Arial%22%3E이미지 등록 전%3C/text%3E%3C/svg%3E';" />
		            </td>
		            <td data-label="제품명">
		              <a th:href="@{'/product/' + ${product.productId}}" th:text="${product.name}"></a>
		            </td>
		            <td data-label="설명" th:text="${product.description}"></td>
		            <td data-label="가격" th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + '원'"></td>
		            <td data-label="재고" th:text="${product.stock}"></td>
		            <td data-label="카테고리" th:text="${product.category}">카테고리</td>
		            <td data-label="등록일" th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
		            <td data-label="수정일" th:text="${#temporals.format(product.updatedAt, 'yyyy-MM-dd HH:mm')}"></td>
		          </tr>
		        </tbody>
		      </table>
		    </div>
		    <!-- 검색 결과 없음 -->
		    <div th:if="${searchTried} and ${productPage.totalElements == 0}">
		      <p class="product-empty">검색한 조건의 상품이 없습니다.</p>
		    </div>
		  </div>
			
		  <!-- 페이지네이션 -->
		  <div class="pagination">
		    <a th:if="${productPage.hasPrevious()}" th:href="@{/product(page=${currentPage - 1})}">이전</a>
		
		    <span th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}">
		      <a th:href="@{/product(page=${i})}"
		         th:text="${i + 1}"
		         th:classappend="${i == currentPage} ? 'active' : ''"></a>
		    </span>
		
		    <a th:if="${productPage.hasNext()}" th:href="@{/product(page=${currentPage + 1})}">다음</a>
		  </div>
		</main>
	 </div>
	<th:block th:insert="~{template/fragments/block :: footer}"></th:block>
	<script src="/JS/modifyC.js"></script>
</body>
</html>
