<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" class="h-100" data-bs-theme="auto">
	<head>
	  <meta charset="UTF-8" />
	  <title>관리자 로그인 | RefreshMarket</title>
	  <th:block th:insert="~{template/fragments/block :: config}"></th:block>
	  <link href="/css/loginCSS/login.css?v=20260620-winfix" rel="stylesheet" />
	</head>
	<body>
	  <main class="login-main">
		    <section class="login-card" aria-labelledby="login-title">
		        <a class="login-brand" th:href="@{/}">
		            <span class="login-brand__mark">R</span>
		            <span>Refresh<span>Market</span></span>
		        </a>
		        <p class="login-eyebrow">Admin Console</p>
		        <h1 id="login-title">관리자 로그인</h1>
		        
		        <form class="login-form" th:action="@{/login}" method="post">
		            <label class="login-field" for="id">
		                <span>아이디</span>
		                <input type="text" id="id" name="id" required autocomplete="username" />
		            </label>
		            <label class="login-field" for="passwd">
		                <span>비밀번호</span>
		                <input type="password" id="passwd" name="passwd" required autocomplete="current-password" />
		            </label>
		            <button class="login-submit" type="submit">로그인</button>
		        </form>
		
		        <nav class="login-links" aria-label="로그인 도움말">
		            <a th:href="@{/findid}">아이디 찾기</a>
		            <a th:href="@{/findpasswd}">비밀번호 찾기</a>
		            <a class="login-links__signup" th:href="@{/signup}">회원가입</a>
		        </nav>
		
		        <p class="login-message" th:if="${msg}" th:text="${msg}"></p>
		    </section>
		</main>
	</body>
</html>
